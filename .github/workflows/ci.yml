name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha || github.event.before }} --to ${{ github.event.pull_request.head.sha || github.sha }} --verbose
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true

      - name: Check formatting
        run: npm run format:check

      - name: Linting
        run: npm run lint

      - name: Security audit
        run: npm run security-audit
        continue-on-error: true # Report vulnerabilities but don't fail build immediately

      - name: Check circular dependencies
        run: npm run check-circular

      - name: Check unused dependencies
        run: npm run check-unused
        continue-on-error: true # Depcheck can have false positives

      - name: Type checking
        run: npm run type-check
      - name: Build
        run: npm run build
        env:
          # Use GitHub Secrets for secure build process
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: bloom.msd26@gmail.com
          ADMIN_PASSWORD: ci_password_dummy
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
